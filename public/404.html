<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — mubbie.dev</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function() {
      var key = 'mubbie-theme-explicit';
      function apply(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        var m = document.querySelector('meta[name="theme-color"]');
        if (!m) { m = document.createElement('meta'); m.name = 'theme-color'; document.head.appendChild(m); }
        m.content = theme === 'light' ? '#f5f5f0' : '#0a0a0c';
      }
      var saved = localStorage.getItem(key);
      apply(saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
      matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem(key)) apply(e.matches ? 'dark' : 'light');
      });
    })();
  </script>
</head>
<body>
  <div class="four-oh-four">
    <div>
      <div class="error-code">404</div>
      <div class="terminal-block">
        <div class="terminal-line">
          <span class="prompt">$ </span><span class="cmd">cd /this-page</span>
        </div>
        <div class="terminal-line">
          <span class="err">bash: cd: /this-page: No such file or directory</span>
        </div>
        <div class="terminal-line">
          <span class="prompt">$ </span><span class="comment"># did you rm -rf the wrong thing?</span>
        </div>
        <div class="terminal-line">
          <span class="prompt">$ </span><span class="cursor"></span>
        </div>
      </div>
      <br>
      <a class="home-link" href="/">cd ~</a>
    </div>
  </div>
</body>
</html>
