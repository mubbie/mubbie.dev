<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — mubbie.dev</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    const t = localStorage.getItem('mubbie-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
  </script>
</head>
<body>
  <div class="four-oh-four">
    <div>
      <div class="error-code">404</div>
      <div class="terminal-block">
        <div class="terminal-line">
          <span class="prompt">$ </span><span class="cmd">cd /this-page</span>
        </div>
        <div class="terminal-line">
          <span class="err">bash: cd: /this-page: No such file or directory</span>
        </div>
        <div class="terminal-line">
          <span class="prompt">$ </span><span class="comment"># did you rm -rf the wrong thing?</span>
        </div>
        <div class="terminal-line">
          <span class="prompt">$ </span><span class="cursor"></span>
        </div>
      </div>
      <br>
      <a class="home-link" href="/">cd ~</a>
    </div>
  </div>
</body>
</html>
